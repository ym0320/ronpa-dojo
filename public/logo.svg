<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 140" fill="none">
  <defs>
    <linearGradient id="textGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF2020"/>
      <stop offset="100%" stop-color="#CC0000"/>
    </linearGradient>
    <linearGradient id="extrudeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4880A"/>
      <stop offset="100%" stop-color="#8B5A00"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Gold 3D extrusion -->
  <text x="240" y="108" text-anchor="middle" font-family="'Zen Maru Gothic', 'Hiragino Kaku Gothic Pro', sans-serif" font-size="88" font-weight="900" fill="url(#extrudeGrad)" stroke="#6B3A00" stroke-width="2">論破道場</text>
  <!-- Main red text -->
  <text x="240" y="100" text-anchor="middle" font-family="'Zen Maru Gothic', 'Hiragino Kaku Gothic Pro', sans-serif" font-size="88" font-weight="900" fill="url(#textGrad)" stroke="#1a0000" stroke-width="3" filter="url(#shadow)">論破道場</text>
  <!-- White outline for pop feel -->
  <text x="240" y="100" text-anchor="middle" font-family="'Zen Maru Gothic', 'Hiragino Kaku Gothic Pro', sans-serif" font-size="88" font-weight="900" fill="none" stroke="white" stroke-width="1" opacity="0.4">論破道場</text>
  <!-- Sparkles -->
  <g fill="#FFD700" opacity="0.9">
    <path d="M60 25 L63 32 L70 35 L63 38 L60 45 L57 38 L50 35 L57 32Z" />
    <path d="M420 20 L422 25 L427 27 L422 29 L420 34 L418 29 L413 27 L418 25Z" />
    <path d="M450 110 L452 114 L456 116 L452 118 L450 122 L448 118 L444 116 L448 114Z" />
  </g>
  <!-- Motion lines -->
  <g stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.6">
    <path d="M30 80 Q40 75 35 90" fill="none"/>
    <path d="M450 70 Q440 65 445 80" fill="none"/>
  </g>
</svg>
